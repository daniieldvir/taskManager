<div class="detail-row" [class.is-editing]="isEditing()">
  <span class="detail-label">
    <svg [lucideIcon]="svgIcon().name" [size]="svgIcon().size ?? 14" />
    {{ label() }}
  </span>

  <div class="detail-value">
    @if (isEditing()) {
      <ng-content select="[editControl]" />
    } @else {
      @if (avatar()) {
        <app-avatar [data]="avatar()!" />
      }

      @if (tags().length > 0) {
        @for (chip of tags(); track $index) {
          <app-tag-chip [data]="chip.data" [variant]="chip.variant" />
        }
      }

      <span>{{ value() }}</span>
    }
  </div>
</div>
