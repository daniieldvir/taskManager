<div class="wrapper">
  @if (label()) {
    <label>{{ label() }}:</label>
  }
  <input
    class="custom-input"
    [type]="type()"
    [ngModel]="value()"
    [placeholder]="placeholder()"
    [maxlength]="maxLength()"
    (ngModelChange)="valueChange.emit($event)"
    autocomplete="off"
  />
</div>
