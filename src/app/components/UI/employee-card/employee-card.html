<button class="role-card" (click)="select()">
  <div class="card-content">
    <div class="avatar-wrapper">
      <svg [lucideIcon]="role().icon!" [size]="24" strokeWidth="2.5" />
    </div>
    <div class="user-details">
      <h4 class="user-name">{{ role().name }}</h4>
      <span class="user-role">{{ role().roleType }}</span>
    </div>
  </div>
</button>
