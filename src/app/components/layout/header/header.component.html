<div class="header">
  <div class="logo">Task Manager</div>
  <div class="header-actions">
    <button type="button" class="theme-toggle" (click)="toggleTheme()" title="Toggle Theme">
      @if (theme.theme() === 'dark') {
        <svg lucideSun [size]="20" />
      } @else {
        <svg lucideMoon [size]="20" />
      }
    </button>
  </div>
</div>
